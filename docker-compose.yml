services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: grepiku
      POSTGRES_PASSWORD: grepiku
      POSTGRES_DB: grepiku
    volumes:
      - postgres-data:/var/lib/postgresql/data

  grepiku-redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: ["node", "dist/server.js"]
    env_file: .env
    depends_on:
      - postgres
      - grepiku-redis
    environment:
      DATABASE_URL: postgresql://grepiku:grepiku@postgres:5432/grepiku
      REDIS_URL: redis://grepiku-redis:6379
    ports:
      - "${PORT:-3005}:${PORT:-3005}"

  worker:
    build: .
    command: ["node", "dist/worker.js"]
    stop_grace_period: 10m
    env_file: .env
    depends_on:
      - postgres
      - grepiku-redis
    volumes:
      - ${PROJECT_ROOT:?err}:${PROJECT_ROOT:?err}
    environment:
      DATABASE_URL: postgresql://grepiku:grepiku@postgres:5432/grepiku
      REDIS_URL: redis://grepiku-redis:6379
      PROJECT_ROOT: ${PROJECT_ROOT}
      CODEX_EXEC_PATH: /usr/local/bin/codex-exec
      INTERNAL_API_URL: http://web:${PORT:-3005}/internal/retrieval
      REVIEW_WORKER_CONCURRENCY: 3
      MENTION_WORKER_CONCURRENCY: 3

volumes:
  postgres-data:
